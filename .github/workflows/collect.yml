name: collect

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. These run near morning/evening in Japan.
    - cron: "0 22 * * *"
    - cron: "0 8 * * *"

concurrency:
  group: crypto-research-radar-collect
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip collect]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e .

      - name: Run collector
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LOG_LEVEL: INFO
          STATE_FILE: data/seen_items.json
        run: python -m crypto_radar.main

      - name: Commit state changes
        run: |
          if git diff --quiet -- data/seen_items.json; then
            echo "No state changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/seen_items.json
            git commit -m "Update seen items [skip collect]"
            git push
          fi
